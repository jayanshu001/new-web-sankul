# Redis Configuration File

# Memory Management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Security
# Set the requirepass directive if you want to require password for default user
# requirepass Web@Sankul301Staging

# Alternatively, wait to set ACL via CLI, but for docker-compose standalone
# it's usually easier to set requirepass here. We'll leave it open for local dev,
# or uncomment the line above to enforce password auth.

# Network
bind 0.0.0.0
protected-mode no

# Persistence
appendonly yes
